name: Deploy to GitHub Pages (static fallback)

# NOTE: GitHub Pages can only host the STATIC export, where server-side GitHub
# OAuth and cloud sync are disabled. The primary deployment is now Vercel
# (server mode) so that GitHub login + progress sync work — see README.
# This workflow is therefore manual-only to avoid overriding the Vercel
# deployment on every push. Run it from the Actions tab if you want a static
# (login-less) build on GitHub Pages.
on:
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs of the same group.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        # build:static stashes app/api (OAuth routes can't be statically
        # exported) and sets STATIC_EXPORT=true. next.config.mjs infers basePath
        # from GITHUB_REPOSITORY when GITHUB_ACTIONS=true, so no base path needs
        # to be hardcoded here (rename-safe).
        run: npm run build:static

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
