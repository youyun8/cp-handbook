name: Problem title drift check

# Verifies that every problem title in data/ still matches its official source
# (Codeforces / LeetCode / AtCoder / Luogu / CSES). Titles can silently rot when
# a site renames a problem or an editor introduces a typo, so this runs on a
# weekly schedule and can be triggered manually. It only reads external APIs —
# it never writes; fixes are applied locally with `npm run reconcile:titles:write`.
on:
  schedule:
    # Mondays at 06:17 UTC (off the hour to avoid scheduler congestion).
    - cron: '17 6 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'data/problems.json'
      - 'data/subtopics.json'
      - 'scripts/reconcile-titles.mjs'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check titles against official sources
        run: npm run reconcile:titles:check

      - name: Upload reconciliation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: title-recon-report
          path: .subtopic-gen/title-recon-report.json
          if-no-files-found: ignore
